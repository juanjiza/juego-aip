<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>El Gran Reto del Reciclaje | Aprende Jugando</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0f5e4a 0%, #083d30 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
        }

        .game-container {
            max-width: 1400px;
            width: 100%;
            background: #2b3b2c;
            border-radius: 56px;
            box-shadow: 0 30px 35px rgba(0, 0, 0, 0.4), inset 0 1px 4px rgba(255, 255, 255, 0.2);
            padding: 20px 25px 25px 25px;
        }

        .game-screen {
            background: #FFFAF0;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: inset 0 0 0 3px #FFF8E7, 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .game-header {
            background: #2c3e2b;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background-image: linear-gradient(135deg, #3e5a3a, #1e2e1c);
            border-bottom: 3px solid #f7b32b;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e2a1d;
            padding: 5px 20px;
            border-radius: 50px;
        }

        .player-name-display {
            color: #FFE484;
            font-weight: bold;
            font-size: 1.2rem;
            background: #2d3e2a;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .score-panel {
            background: #1e2a1d;
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            gap: 25px;
            color: #FFE484;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .score-panel span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-box {
            background: #2c2f36;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 1.7rem;
            font-weight: bold;
            font-family: monospace;
            color: #0effbc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .remaining-box {
            background: #f7b32b;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: #2d3e2a;
        }

        .bins-row {
            display: flex;
            justify-content: space-evenly;
            background: #ebe1c1;
            padding: 20px 15px 15px;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 4px solid #cfba8f;
        }

        .bin {
            flex: 1;
            min-width: 120px;
            background: #ffffffdb;
            border-radius: 35px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s;
            box-shadow: 0 8px 0 #b0a07c;
            border: 2px solid #fae67a;
        }

        .bin.active-drop {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px gold, 0 8px 0 #b0a07c;
            background: #fff9e8;
        }

        .bin-color {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin: 0 auto 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1), 0 3px 6px rgba(0,0,0,0.2);
        }

        .bin-title {
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .bin-sub {
            font-size: 0.7rem;
            color: #444;
            font-weight: 600;
        }

        .waste-area {
            padding: 25px 20px;
            background: #f4edd8;
            min-height: 420px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 110px));
            gap: 18px;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .waste-item {
            background: white;
            border-radius: 28px;
            padding: 10px 8px 8px;
            text-align: center;
            cursor: grab;
            transition: all 0.1s linear;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
            border: 2px solid #ffd966;
        }

        .waste-item:active {
            cursor: grabbing;
        }

        .waste-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .waste-icon {
            font-size: 3.2rem;
        }

        .waste-name {
            font-weight: 600;
            font-size: 0.7rem;
            background: #f0ede5;
            border-radius: 30px;
            margin-top: 6px;
            padding: 4px;
        }

        .feedback {
            text-align: center;
            background: #2c2f36e6;
            color: #f5e56b;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            transition: 0.2s;
            line-height: 1.4;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: #e7dbbc;
        }

        .btn {
            background: #f7b32b;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 10px 28px;
            border-radius: 60px;
            color: #2d441f;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #ac6f20;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #ac6f20;
        }

        .modal-name {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #FFFAF0;
            border-radius: 50px;
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 35px black;
            border: 4px solid #f7b32b;
        }

        .modal-content h2 {
            color: #2d441f;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .modal-content input {
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 2px solid #f7b32b;
            width: 100%;
            margin: 20px 0;
            text-align: center;
            font-family: inherit;
        }

        .modal-content button {
            background: #f7b32b;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 750px) {
            .waste-area {
                grid-template-columns: repeat(auto-fill, minmax(80px, 85px));
                gap: 12px;
            }
            .waste-icon { font-size: 2.4rem; }
            .bin { min-width: 85px; }
            .bin-title { font-size: 0.7rem; }
            .score-panel { font-size: 1rem; gap: 12px; }
            .timer-box { font-size: 1.2rem; padding: 4px 12px; }
            .player-name-display { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-screen">
        <div class="game-header">
            <div class="player-info">
                <span style="color:#FFE484;">🧑‍🎓</span>
                <span id="playerNameDisplay" class="player-name-display">Jugador</span>
                <span style="color:#FFE484;">♻️</span>
            </div>
            <div class="score-panel">
                <span>⭐ <span id="puntosDisplay">0</span></span>
                <span>✅ <span id="aciertosContador">0</span>/<span id="totalResiduosSpan">0</span></span>
            </div>
            <div class="remaining-box">
                📦 <span id="restantesSpan">0</span> restantes
            </div>
            <div class="timer-box">
                ⏱️ <span id="timerDisplay">08:00</span>
            </div>
        </div>

        <div class="bins-row" id="binsContainer"></div>
        <div class="waste-area" id="wasteArea"></div>
        <div class="feedback" id="feedbackMsg">
            🌟 ¡Clasifica los 15 residuos! +5 por acierto, -2 por error. Tiempo: 8 minutos 🌟
        </div>
        <div class="action-buttons">
            <button class="btn" id="resetGameBtn">🔄 Reiniciar juego</button>
            <button class="btn" id="shuffleBtn">🎲 Barajar residuos</button>
        </div>
    </div>
</div>

<div id="nameModal" class="modal-name">
    <div class="modal-content">
        <h2>♻️ EL GRAN RETO DEL RECICLAJE 🚀</h2>
        <p style="margin-bottom: 10px;">Ingresa tu nombre para comenzar:</p>
        <input type="text" id="playerNameInput" placeholder="Escribe tu nombre aquí" maxlength="25" autocomplete="off">
        <button id="startGameBtn">🌍 ¡A RECICLAR! 🌍</button>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // BASE DE DATOS CON 100 RESIDUOS (CORREGIDA: Cepillo dental va a GRIS con explicación)
    // --------------------------------------------------------------
    const generar100Residuos = () => {
        return [
            // Plásticos y envases (amarillo) - 25 items
            { nombre: "Botella plástica", icono: "🧴", categoria: "amarillo", explicacion: "Botellas de plástico se reciclan en amarillo" },
            { nombre: "Lata de refresco", icono: "🥫", categoria: "amarillo", explicacion: "Latas van al contenedor amarillo" },
            { nombre: "Envase de yogur", icono: "🥤", categoria: "amarillo", explicacion: "Envases de yogur son plástico reciclable" },
            { nombre: "Brik de leche", icono: "🧃", categoria: "amarillo", explicacion: "Briks (tetrabrik) van al amarillo" },
            { nombre: "Tapa plástica", icono: "🔘", categoria: "amarillo", explicacion: "Tapas de plástico van al contenedor amarillo" },
            { nombre: "Envase de champú", icono: "🧴", categoria: "amarillo", explicacion: "Envases de champú reciclables en amarillo" },
            { nombre: "Botella de agua", icono: "💧", categoria: "amarillo" },{ nombre: "Tupper roto", icono: "🍱", categoria: "amarillo" },{ nombre: "Vaso plástico", icono: "🥛", categoria: "amarillo" },{ nombre: "Cubiertos plástico", icono: "🥄", categoria: "amarillo" },{ nombre: "Pajita", icono: "🥤", categoria: "amarillo" },{ nombre: "Funda de móvil", icono: "📱", categoria: "amarillo" },{ nombre: "Juguete plástico", icono: "🧸", categoria: "amarillo" },{ nombre: "Cinta de video", icono: "📼", categoria: "amarillo" },{ nombre: "Balde plástico", icono: "🪣", categoria: "amarillo" },{ nombre: "Envase de detergente", icono: "🧴", categoria: "amarillo" },{ nombre: "Cepillo de plástico (limpia)", icono: "🪥", categoria: "amarillo", explicacion: "Cepillos de plástico sin cerdas complejas van amarillo" },{ nombre: "Plato desechable", icono: "🍽️", categoria: "amarillo" },{ nombre: "Envase de helado", icono: "🍦", categoria: "amarillo" },{ nombre: "Tapa de frasco", icono: "🔘", categoria: "amarillo" },{ nombre: "Aro de plástico", icono: "⭕", categoria: "amarillo" },{ nombre: "Red de embalaje", icono: "🎣", categoria: "amarillo" },{ nombre: "Potes de crema", icono: "🧴", categoria: "amarillo" },{ nombre: "Envase de aceite", icono: "🫒", categoria: "amarillo" },{ nombre: "Caja de CD", icono: "💿", categoria: "amarillo" },
            // Papel y cartón (azul) - 20 items
            { nombre: "Periódico viejo", icono: "📰", categoria: "azul" },{ nombre: "Caja de cartón", icono: "📦", categoria: "azul" },{ nombre: "Revista", icono: "📓", categoria: "azul" },{ nombre: "Cuaderno usado", icono: "📘", categoria: "azul" },{ nombre: "Sobre de carta", icono: "✉️", categoria: "azul" },{ nombre: "Caja de cereales", icono: "🥣", categoria: "azul" },{ nombre: "Folios impresos", icono: "📄", categoria: "azul" },{ nombre: "Catálogo publicitario", icono: "📇", categoria: "azul" },{ nombre: "Papel de regalo", icono: "🎁", categoria: "azul" },{ nombre: "Caja de zapatos", icono: "👟", categoria: "azul" },{ nombre: "Carpeta de papel", icono: "📁", categoria: "azul" },{ nombre: "Libro viejo", icono: "📖", categoria: "azul" },{ nombre: "Caja de pizza", icono: "🍕", categoria: "azul" },{ nombre: "Cartulina", icono: "🖼️", categoria: "azul" },{ nombre: "Periódico deportivo", icono: "🏀", categoria: "azul" },{ nombre: "Bolsa de papel", icono: "🛍️", categoria: "azul" },{ nombre: "Caja pequeña", icono: "📭", categoria: "azul" },{ nombre: "Block de notas", icono: "📝", categoria: "azul" },{ nombre: "Papel kraft", icono: "📜", categoria: "azul" },{ nombre: "Papel higiénico (limpio)", icono: "🧻", categoria: "azul", explicacion: "Papel higiénico sin usar o rollo de cartón" },
            // Vidrio (verde) - 15 items
            { nombre: "Botella vidrio", icono: "🍾", categoria: "verde" },{ nombre: "Tarro de vidrio", icono: "🥃", categoria: "verde" },{ nombre: "Frasco de perfume", icono: "🧪", categoria: "verde" },{ nombre: "Vaso de vidrio", icono: "🥛", categoria: "verde" },{ nombre: "Frasco mermelada", icono: "🏺", categoria: "verde" },{ nombre: "Botella de vino", icono: "🍷", categoria: "verde" },{ nombre: "Ampolla medicina", icono: "💊", categoria: "verde" },{ nombre: "Jarra de vidrio", icono: "🍶", categoria: "verde" },{ nombre: "Espejo roto", icono: "🪞", categoria: "verde" },{ nombre: "Cenicero vidrio", icono: "🚬", categoria: "verde" },{ nombre: "Copa de vidrio", icono: "🥂", categoria: "verde" },{ nombre: "Pisa papeles", icono: "🔮", categoria: "verde" },{ nombre: "Frasco especias", icono: "🌶️", categoria: "verde" },{ nombre: "Bote de vidrio", icono: "🏺", categoria: "verde" },{ nombre: "Tetera vidrio", icono: "🍵", categoria: "verde" },
            // Orgánico (marron) - 20 items
            { nombre: "Cáscara plátano", icono: "🍌", categoria: "marron" },{ nombre: "Manzana mordida", icono: "🍎", categoria: "marron" },{ nombre: "Restos de comida", icono: "🍝", categoria: "marron" },{ nombre: "Cáscara huevo", icono: "🥚", categoria: "marron" },{ nombre: "Cáscara naranja", icono: "🍊", categoria: "marron" },{ nombre: "Hojas de té", icono: "🍃", categoria: "marron" },{ nombre: "Cáscara patata", icono: "🥔", categoria: "marron" },{ nombre: "Posos de café", icono: "☕", categoria: "marron" },{ nombre: "Hueso de aguacate", icono: "🥑", categoria: "marron" },{ nombre: "Cáscara sandía", icono: "🍉", categoria: "marron" },{ nombre: "Pan duro", icono: "🥖", categoria: "marron" },{ nombre: "Resto verduras", icono: "🥬", categoria: "marron" },{ nombre: "Fruta podrida", icono: "🍑", categoria: "marron" },{ nombre: "Cáscara limón", icono: "🍋", categoria: "marron" },{ nombre: "Cáscara mandarina", icono: "🍊", categoria: "marron" },{ nombre: "Resto de pescado", icono: "🐟", categoria: "marron" },{ nombre: "Cáscara de mango", icono: "🥭", categoria: "marron" },{ nombre: "Flor marchita", icono: "🌻", categoria: "marron" },{ nombre: "Cáscara de piña", icono: "🍍", categoria: "marron" },{ nombre: "Cáscara de kiwi", icono: "🥝", categoria: "marron" },
            // Resto / General (gris) - 20 items (incluye cepillo dental común)
            { nombre: "Pañal desechable", icono: "🧷", categoria: "gris", explicacion: "Los pañales van al contenedor gris (resto)" },
            { nombre: "Envoltorio sucio", icono: "🍬", categoria: "gris", explicacion: "Plásticos sucios o mezclados no reciclables" },
            { nombre: "Papel higiénico usado", icono: "🧻", categoria: "gris", explicacion: "Papel higiénico usado NO se recicla, va a resto" },
            { nombre: "Colilla cigarro", icono: "🚬", categoria: "gris" },{ nombre: "Esponja vieja", icono: "🧽", categoria: "gris" },
            { nombre: "Cepillo dental común (plástico + nylon)", icono: "🪥", categoria: "gris", explicacion: "Los cepillos dentales tienen materiales mixtos: van al contenedor GRIS (Resto)" },
            { nombre: "Bolsas rotas", icono: "🛍️", categoria: "gris" },{ nombre: "Mascarilla usada", icono: "😷", categoria: "gris" },{ nombre: "Toalla húmeda", icono: "🧻", categoria: "gris" },{ nombre: "Cinta adhesiva", icono: "📦", categoria: "gris" },{ nombre: "Chicle", icono: "🍬", categoria: "gris" },{ nombre: "Pelusa aspiradora", icono: "🧹", categoria: "gris" },{ nombre: "Filtro de café", icono: "☕", categoria: "gris" },{ nombre: "Cera de vela", icono: "🕯️", categoria: "gris" },{ nombre: "Cables viejos", icono: "🔌", categoria: "gris" },{ nombre: "Goma de borrar", icono: "🧽", categoria: "gris" },{ nombre: "Esparadrapo", icono: "🩹", categoria: "gris" },{ nombre: "Tapón de corcho", icono: "🍾", categoria: "gris" },{ nombre: "Plumón seco", icono: "🖊️", categoria: "gris" },{ nombre: "Cuchara de madera rota", icono: "🥄", categoria: "gris" }
        ];
    };

    const RESIDUOS_TOTALES = generar100Residuos();
    const BINS_CONFIG = [
        { id: "amarillo", color: "#F9E45B", title: "💛 Plásticos y Envases", sub: "Botellas, latas, bricks" },
        { id: "azul", color: "#5B9AD0", title: "💙 Papel y Cartón", sub: "Periódicos, cajas, papel limpio" },
        { id: "verde", color: "#6FBF4C", title: "💚 Vidrio", sub: "Botellas, frascos" },
        { id: "marron", color: "#A5673F", title: "🤎 Materia Orgánica", sub: "Restos comida, cáscaras" },
        { id: "gris", color: "#9E9E9E", title: "🩶 Resto / General", sub: "Pañales, mezclas, cepillos" }
    ];

    let listaActiva = [], puntos = 0, aciertos = 0, tiempoSegundos = 8 * 60;
    let timerInterval = null, juegoActivo = true, dragEnabled = true;
    let currentDragIndex = null, currentDragElement = null, nombreJugador = "Jugador";

    // DOM
    const puntosSpan = document.getElementById("puntosDisplay"), aciertosSpan = document.getElementById("aciertosContador");
    const totalResiduosSpan = document.getElementById("totalResiduosSpan"), restantesSpan = document.getElementById("restantesSpan");
    const timerDisplaySpan = document.getElementById("timerDisplay"), feedbackDiv = document.getElementById("feedbackMsg");
    const wasteAreaDiv = document.getElementById("wasteArea"), binsContainer = document.getElementById("binsContainer");
    const resetBtn = document.getElementById("resetGameBtn"), shuffleBtn = document.getElementById("shuffleBtn");
    const playerNameDisplay = document.getElementById("playerNameDisplay"), nameModal = document.getElementById("nameModal");
    const playerNameInput = document.getElementById("playerNameInput"), startGameBtn = document.getElementById("startGameBtn");

    function seleccionar15Aleatorios() {
        const shuffled = [...RESIDUOS_TOTALES];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 15);
    }

    function reiniciarLista() { listaActiva = seleccionar15Aleatorios(); actualizarContadores(); }
    function actualizarContadores() { totalResiduosSpan.innerText = listaActiva.length; restantesSpan.innerText = listaActiva.length; aciertosSpan.innerText = aciertos; puntosSpan.innerText = puntos; }
    function actualizarPuntosYUI() { puntosSpan.innerText = puntos; aciertosSpan.innerText = aciertos; restantesSpan.innerText = listaActiva.length; }

    function renderBins() {
        binsContainer.innerHTML = "";
        BINS_CONFIG.forEach(bin => {
            const binDiv = document.createElement("div");
            binDiv.className = "bin";
            binDiv.setAttribute("data-category", bin.id);
            binDiv.addEventListener("dragover", (e) => { e.preventDefault(); if (juegoActivo && dragEnabled) binDiv.classList.add("active-drop"); });
            binDiv.addEventListener("dragleave", () => binDiv.classList.remove("active-drop"));
            binDiv.addEventListener("drop", (e) => {
                e.preventDefault();
                binDiv.classList.remove("active-drop");
                if (!juegoActivo || !dragEnabled) return;
                const categoryTarget = binDiv.getAttribute("data-category");
                if (currentDragIndex !== null && currentDragElement) {
                    const waste = listaActiva[currentDragIndex];
                    if (waste) procesarIntento(waste, categoryTarget, currentDragIndex);
                    currentDragIndex = null; currentDragElement = null;
                }
            });
            binDiv.innerHTML = `<div class="bin-color" style="background: ${bin.color};"></div><div class="bin-title">${bin.title}</div><div class="bin-sub">${bin.sub}</div>`;
            binsContainer.appendChild(binDiv);
        });
    }

    function procesarIntento(wasteData, categoriaContenedor, idx) {
        if (!juegoActivo) return;
        const esCorrecto = (wasteData.categoria === categoriaContenedor);
        const explicacion = wasteData.explicacion || (esCorrecto ? "¡Muy bien!" : `El residuo correcto es ${getNombreBin(wasteData.categoria)}.`);
        if (esCorrecto) {
            puntos += 5; aciertos++;
            listaActiva.splice(idx, 1);
            feedbackDiv.innerHTML = `✅ ¡Correcto, ${nombreJugador}! +5 pts. ${wasteData.nombre} ✅<br><span style="font-size:0.8rem;">📘 ${explicacion}</span>`;
            feedbackDiv.style.background = "#1e6a3ce6";
            setTimeout(() => { if(juegoActivo) feedbackDiv.style.background = "#2c2f36e6"; }, 1200);
            actualizarPuntosYUI();
            renderizarResiduos();
            if (listaActiva.length === 0) terminarJuegoVictoria();
        } else {
            puntos = Math.max(0, puntos - 2);
            feedbackDiv.innerHTML = `❌ ¡Error, ${nombreJugador}! ${wasteData.nombre} NO va al ${getNombreBin(categoriaContenedor)}. -2 pts ❌<br><span style="font-size:0.8rem;">📘 ${explicacion}</span>`;
            feedbackDiv.style.background = "#9b3a2ae6";
            setTimeout(() => { if(juegoActivo) feedbackDiv.style.background = "#2c2f36e6"; }, 1500);
            actualizarPuntosYUI();
            renderizarResiduos();
        }
    }

    function getNombreBin(categoryId) { const found = BINS_CONFIG.find(b => b.id === categoryId); return found ? found.title : "contenedor"; }

    function renderizarResiduos() {
        wasteAreaDiv.innerHTML = "";
        if (!juegoActivo && listaActiva.length === 0) { wasteAreaDiv.innerHTML = "<div style='text-align:center; padding:40px;'>🏆 ¡COMPLETASTE EL RETO! 🏆</div>"; return; }
        if (listaActiva.length === 0 && juegoActivo) terminarJuegoVictoria();
        listaActiva.forEach((residuo, idx) => {
            const wasteDiv = document.createElement("div");
            wasteDiv.className = "waste-item";
            wasteDiv.setAttribute("draggable", "true");
            wasteDiv.innerHTML = `<div class="waste-icon">${residuo.icono}</div><div class="waste-name">${residuo.nombre}</div>`;
            wasteDiv.addEventListener("dragstart", (e) => {
                if (!juegoActivo || !dragEnabled) { e.preventDefault(); return false; }
                currentDragIndex = idx; currentDragElement = wasteDiv;
                e.dataTransfer.setData("text/plain", idx);
                wasteDiv.classList.add("dragging");
            });
            wasteDiv.addEventListener("dragend", () => wasteDiv.classList.remove("dragging"));
            wasteAreaDiv.appendChild(wasteDiv);
        });
    }

    function terminarJuegoVictoria() {
        if (!juegoActivo) return;
        if (timerInterval) clearInterval(timerInterval);
        juegoActivo = false; dragEnabled = false;
        feedbackDiv.innerHTML = `🎉🎊 ¡FELICIDADES ${nombreJugador}! Clasificaste los 15 residuos. Puntuación final: ${puntos} pts. ¡Eres experto! 🎊🎉`;
        wasteAreaDiv.innerHTML = "<div style='text-align:center; padding:40px;'>🏆 ¡MISIÓN CUMPLIDA! 🏆<br>♻️ Salvaste el planeta ♻️</div>";
    }

    function terminarJuegoTiempo() {
        if (!juegoActivo) return;
        if (timerInterval) clearInterval(timerInterval);
        juegoActivo = false; dragEnabled = false;
        feedbackDiv.innerHTML = `⏰ ¡TIEMPO AGOTADO, ${nombreJugador}! Clasificaste ${aciertos} de 15. Puntos: ${puntos}. Reinicia para otro reto. ⏰`;
        wasteAreaDiv.innerHTML = `<div style="text-align:center; padding:40px;">⌛ Se acabó el tiempo.<br>✅ Aciertos: ${aciertos} de 15</div>`;
    }

    function iniciarTemporizador() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!juegoActivo) return;
            if (tiempoSegundos <= 0) terminarJuegoTiempo();
            else { tiempoSegundos--; actualizarTimerUI(); }
        }, 1000);
    }

    function actualizarTimerUI() {
        const mins = Math.floor(tiempoSegundos / 60), segs = tiempoSegundos % 60;
        timerDisplaySpan.innerText = `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
        timerDisplaySpan.style.color = tiempoSegundos <= 60 ? "#ff8866" : "#0effbc";
    }

    function resetJuegoCompleto() {
        if (timerInterval) clearInterval(timerInterval);
        puntos = 0; aciertos = 0; tiempoSegundos = 8 * 60;
        juegoActivo = true; dragEnabled = true;
        reiniciarLista();
        actualizarContadores();
        actualizarTimerUI();
        renderizarResiduos();
        iniciarTemporizador();
        feedbackDiv.innerHTML = "♻️ ¡NUEVO JUEGO! +5 por acierto, -2 por error. 8 minutos. ¡A reciclar! ♻️";
        feedbackDiv.style.background = "#2c2f36e6";
        currentDragIndex = null;
    }

    function iniciarJuegoConNombre() {
        let nombre = playerNameInput.value.trim();
        if (nombre === "") nombre = "ECO-HÉROE";
        nombreJugador = nombre;
        playerNameDisplay.innerText = nombreJugador;
        nameModal.style.display = "none";
        resetJuegoCompleto();
    }

    renderBins();
    resetBtn.addEventListener("click", resetJuegoCompleto);
    shuffleBtn.addEventListener("click", () => { if(juegoActivo) { for (let i = listaActiva.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [listaActiva[i], listaActiva[j]] = [listaActiva[j], listaActiva[i]]; } renderizarResiduos(); feedbackDiv.innerHTML = "🃏 ¡Residuos barajados! Sigue clasificando."; setTimeout(() => { if(juegoActivo) feedbackDiv.style.background = "#2c2f36e6"; }, 1000); } else feedbackDiv.innerHTML="Juego terminado, reinicia para barajar"; });
    startGameBtn.addEventListener("click", iniciarJuegoConNombre);
    playerNameInput.addEventListener("keypress", (e) => { if(e.key === "Enter") iniciarJuegoConNombre(); });
</script>
</body>
</html>
